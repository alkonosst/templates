# Auto-label each PR from its conventional commit title.
# Accepted types:
# - feat/fix/docs/chore/ci/refactor
# - breaking-change for "type!:" or "type(scope)!:" (scope is optional)
name: PR conventional label

on:
  workflow_call:

permissions:
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - name: Label PR from conventional commit title
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Resolve the target label from the conventional commit title. An empty label
          # means the title is unrecognized; the PR is then left without a managed label.
          pattern='^([a-zA-Z]+)(\([^)]+\))?(!)?:'
          label=""
          if [[ "$PR_TITLE" =~ $pattern ]]; then
            type="${BASH_REMATCH[1],,}"
            breaking="${BASH_REMATCH[3]}"
            case "$type" in
              feat)     label="feat" ;;
              fix)      label="fix" ;;
              docs)     label="docs" ;;
              refactor) label="refactor" ;;
              chore)    label="chore" ;;
              ci)       label="ci" ;;
            esac
            # A breaking marker ("!") only applies to a recognized type
            if [ -n "$label" ] && [ -n "$breaking" ]; then
              label="breaking-change"
            fi
          fi

          managed="breaking-change feat fix docs refactor chore ci"

          # Label definitions; created on first use, existing labels are left untouched
          declare -A color=(
            ["breaking-change"]=b60205
            ["feat"]=a2eeef
            ["fix"]=0e8a16
            ["docs"]=0075ca
            ["refactor"]=1d76db
            ["chore"]=5319e7
            ["ci"]=006b75
          )
          declare -A description=(
            ["breaking-change"]="Modifies the API or breaks backward compatibility for users."
            ["feat"]="Adds new functionality without breaking the API."
            ["fix"]="Fixes a bug but doesn't change the API."
            ["docs"]="Documentation changes only."
            ["refactor"]="Code change that neither fixes a bug nor adds a feature."
            ["chore"]="Routine tasks that don't modify the API."
            ["ci"]="CI/CD maintenance."
          )

          # Remove every managed label except the target one. This also clears a stale
          # label when the title is edited to an unrecognized one (label stays empty).
          for current in $managed; do
            if [ "$current" != "$label" ]; then
              gh pr edit "$PR_NUMBER" --repo "$REPO" --remove-label "$current" >/dev/null 2>&1 || true
            fi
          done

          if [ -z "$label" ]; then
            echo "Title is not a recognized conventional commit: '$PR_TITLE'. Cleared managed labels."
            exit 0
          fi

          # Create the label if missing, then apply it
          gh label create "$label" --repo "$REPO" \
            --color "${color[$label]}" \
            --description "${description[$label]}" >/dev/null 2>&1 || true

          gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "$label"

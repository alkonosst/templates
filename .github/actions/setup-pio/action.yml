name: Setup PlatformIO
description: Install PlatformIO. Requires Python and pip to be available on the runner - run setup-python first.

inputs:
  pio-version:
    description: 'The version of PlatformIO to install. Use "latest" for the latest version.'
    required: false
    default: "latest"
  use-cache:
    description: Cache PlatformIO packages to speed up subsequent runs.
    required: false
    default: "true"
  cache-key-suffix:
    description: >
      Token added to the cache key. Set a per-environment value (e.g. the board env) when parallel
      jobs install different platforms, so their caches do not overwrite each other.
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Cache PlatformIO
      if: ${{ inputs.use-cache == 'true' }}
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.platformio
        key: platformio-${{ runner.os }}-${{ inputs.cache-key-suffix }}-${{ hashFiles('**/platformio.ini') }}
        restore-keys: |
          platformio-${{ runner.os }}-${{ inputs.cache-key-suffix }}-

    - name: Install PlatformIO
      shell: bash
      env:
        PIO_VERSION: ${{ inputs.pio-version }}
      run: |
        if [ "$PIO_VERSION" = "latest" ]; then
          pip install --upgrade platformio
        else
          pip install "platformio==$PIO_VERSION"
        fi

    - name: Verify installation
      shell: bash
      run: |
        pio --version || { echo "::error::PlatformIO installation could not be verified."; exit 1; }

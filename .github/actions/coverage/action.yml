name: Coverage
description: >
  Generate a coverage report with gcovr and optionally upload it to Codecov.
  Requires Python and pip to be available on the runner - run setup-python first.

inputs:
  filter:
    description: gcovr filter to restrict which sources are included in the report.
    required: false
    default: "src/"
  search-path:
    description: Directory to search for coverage data files (.gcno/.gcda). Defaults to the project root.
    required: false
    default: "."
  fail-under-line:
    description: Fail if the line coverage is below this percentage. Empty disables the check.
    required: false
    default: ""
  xml-output:
    description: Path of the Cobertura XML report consumed by Codecov.
    required: false
    default: "coverage.xml"
  upload-codecov:
    description: Upload the XML report to Codecov.
    required: false
    default: "false"
  codecov-token:
    description: Codecov token. Optional for public repositories.
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Check for Python installation
      shell: bash
      run: |
        python --version || { echo "::error::Python is not installed. Please run setup-python first."; exit 1; }

    - name: Install gcovr
      shell: bash
      run: |
        pip install --upgrade gcovr

    - name: Generate coverage report
      shell: bash
      env:
        FILTER: ${{ inputs.filter }}
        SEARCH_PATH: ${{ inputs.search-path }}
        XML_OUTPUT: ${{ inputs.xml-output }}
        FAIL_UNDER: ${{ inputs.fail-under-line }}
      run: |
        args=(--root . --filter "$FILTER" --xml "$XML_OUTPUT" --print-summary "$SEARCH_PATH")
        if [ -n "$FAIL_UNDER" ]; then
          args+=(--fail-under-line "$FAIL_UNDER")
        fi

        # Capture gcovr output so the coverage totals can be echoed to the run summary.
        if ! summary="$(gcovr "${args[@]}" 2>&1)"; then
          echo "$summary"
          {
            echo "### Coverage (failed)"
            echo ""
            echo '```'
            echo "$summary" | grep -E '^(lines|functions|branches):' || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::error::Coverage report generation failed, or line coverage is below the fail-under threshold."
          exit 1
        fi
        echo "$summary"

        {
          echo "### Coverage"
          echo ""
          echo '```'
          echo "$summary" | grep -E '^(lines|functions|branches):' || echo "$summary"
          echo '```'
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Upload coverage to Codecov
      if: ${{ inputs.upload-codecov == 'true' }}
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
      with:
        files: ${{ inputs.xml-output }}
        token: ${{ inputs.codecov-token }}
        fail_ci_if_error: false

name: PlatformIO compile examples
description: >
  Compile every example under the examples/ directory with "pio ci". Example folders are discovered
  recursively (grouping/category subfolders are supported) and classified by content: a folder
  containing a *.ino file is built as an Arduino example, otherwise (a folder with C/C++ sources) as a
  Native example. Each example is compiled once per environment in the matching list, aborting on the
  first failure. Requires PlatformIO to be installed - run setup-pio first.

inputs:
  examples-dir:
    description: Root directory under which example folders are searched (recursively).
    required: false
    default: "examples"
  arduino-envs:
    description: >
      Space-separated list of PlatformIO environments used to compile Arduino examples (folders with a
      *.ino file). Each Arduino example is compiled once per environment. An empty list skips them.
    required: false
    default: "esp32-s3-test"
  native-envs:
    description: >
      Space-separated list of PlatformIO environments used to compile Native examples (folders without
      a *.ino file). Each Native example is compiled once per environment. An empty list skips them.
    required: false
    default: "native-test"
  lib-path:
    description: Library location passed to "pio ci --lib" so examples can include the library.
    required: false
    default: "."
  project-conf:
    description: PlatformIO configuration file passed to "pio ci --project-conf".
    required: false
    default: "platformio.ini"

runs:
  using: "composite"
  steps:
    - name: Check for PlatformIO installation
      shell: bash
      run: |
        pio --version || { echo "::error::PlatformIO is not installed. Please run setup-pio first."; exit 1; }

    - name: Compile examples
      shell: bash
      env:
        EXAMPLES_DIR: ${{ inputs.examples-dir }}
        ARDUINO_ENVS: ${{ inputs.arduino-envs }}
        NATIVE_ENVS: ${{ inputs.native-envs }}
        LIB_PATH: ${{ inputs.lib-path }}
        PROJECT_CONF: ${{ inputs.project-conf }}
      run: |
        # Discover example folders recursively by the source they directly contain. find's "%h" is the
        # directory holding each matched file, so grouping/category folders (which hold only
        # subfolders) are skipped automatically.
        mapfile -t arduino_dirs < <(find "$EXAMPLES_DIR" -type f -name '*.ino' -printf '%h\n' | sort -u)
        mapfile -t native_all < <(find "$EXAMPLES_DIR" -type f \
          \( -name '*.cpp' -o -name '*.cc' -o -name '*.cxx' -o -name '*.c' \) -printf '%h\n' | sort -u)

        # A folder with a *.ino is an Arduino example even if it also has C/C++ helper sources.
        native_dirs=()
        for dir in "${native_all[@]}"; do
          is_arduino=false
          for arduino_dir in "${arduino_dirs[@]}"; do
            [ "$dir" = "$arduino_dir" ] && { is_arduino=true; break; }
          done
          if [ "$is_arduino" = false ]; then
            native_dirs+=("$dir")
          fi
        done

        if [ ${#arduino_dirs[@]} -eq 0 ] && [ ${#native_dirs[@]} -eq 0 ]; then
          echo "No example folders found under '$EXAMPLES_DIR'. Nothing to compile."
          exit 0
        fi

        read -ra arduino_envs <<< "$ARDUINO_ENVS"
        read -ra native_envs <<< "$NATIVE_ENVS"

        count=0
        rows=()

        write_summary() {
          if [ ${#rows[@]} -eq 0 ]; then
            return
          fi
          {
            echo "### PlatformIO example compilation"
            echo ""
            echo "| Example | Type | Environment | Result |"
            echo "| --- | --- | --- | --- |"
            printf '%s\n' "${rows[@]}"
          } >> "$GITHUB_STEP_SUMMARY"
        }

        # "pio ci" copies the example into a temporary project (so .ino sketches are compiled
        # correctly), links the library from -l, and builds it with the -e environment from -c.
        compile_example() {
          local example="$1" env="$2" type="$3"
          echo "::group::Compiling $type example: $example (env: $env)"
          if ! pio ci -l "$LIB_PATH" -c "$PROJECT_CONF" -e "$env" "$example"; then
            echo "::endgroup::"
            rows+=("| \`$example\` | $type | \`$env\` | FAILED |")
            write_summary
            echo "::error::Failed to compile $type example: $example (env: $env)"
            exit 1
          fi
          echo "::endgroup::"
          rows+=("| \`$example\` | $type | \`$env\` | OK |")
          count=$((count + 1))
        }

        # An empty env list skips that example type (the loop body simply never runs).
        for example in "${arduino_dirs[@]}"; do
          for env in "${arduino_envs[@]}"; do
            compile_example "$example" "$env" "Arduino"
          done
        done

        for example in "${native_dirs[@]}"; do
          for env in "${native_envs[@]}"; do
            compile_example "$example" "$env" "Native"
          done
        done

        write_summary
        echo "Successfully compiled $count example build(s)."

name: Setup Python
description: Install Python, upgrade pip and install optional dependencies.

inputs:
  python-version:
    description: Python version.
    required: false
    default: "3.13"
  dependencies:
    description: A list of dependencies to install with pip. Separate multiple dependencies with a space.
    required: false
    default: ""
  cache-pip:
    description: Cache downloaded pip packages (~/.cache/pip) to speed up subsequent installs.
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Setup Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ inputs.python-version }}

    - name: Cache pip
      if: ${{ inputs.cache-pip == 'true' }}
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.cache/pip
        key: pip-${{ runner.os }}-${{ inputs.python-version }}-${{ github.run_id }}
        restore-keys: |
          pip-${{ runner.os }}-${{ inputs.python-version }}-

    - name: Upgrade pip and install dependencies
      shell: bash
      env:
        DEPS: ${{ inputs.dependencies }}
      run: |
        python -m pip install --upgrade pip
        read -ra deps <<< "$DEPS"
        if [ ${#deps[@]} -gt 0 ]; then
          if ! pip install "${deps[@]}"; then
            echo "::error::Failed to install dependencies: ${deps[*]}"
            exit 1
          fi
        fi

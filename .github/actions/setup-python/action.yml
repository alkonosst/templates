name: Setup Python
description: Install Python, upgrade pip and install optional dependencies.

inputs:
  python-version:
    description: Python version.
    required: false
    default: "3.13"
  dependencies:
    description: A list of dependencies to install with pip. Separate multiple dependencies with a space.
    required: false
    default: ""
  cache-pip:
    description: Cache pip packages to speed up subsequent runs (requires "requirements.txt" in the repository).
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Setup Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ inputs.python-version }}
        cache: ${{ inputs.cache-pip == 'true' && 'pip' || '' }}

    - name: Upgrade pip and install dependencies
      shell: bash
      env:
        DEPS: ${{ inputs.dependencies }}
      run: |
        python -m pip install --upgrade pip
        read -ra deps <<< "$DEPS"
        if [ ${#deps[@]} -gt 0 ]; then
          if ! pip install "${deps[@]}"; then
            echo "::error::Failed to install dependencies: ${deps[*]}"
            exit 1
          fi
        fi

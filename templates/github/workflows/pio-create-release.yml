# When a semantic version tag is pushed (e.g. v1.2.3): verify CI is green for the tagged commit,
# create the GitHub release and publish to the PlatformIO Registry, via the reusable release workflow.
name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write # the release job creates the GitHub release
  actions: read # the verify-ci job reads the CI run status

jobs:
  release:
    uses: alkonosst/templates/.github/workflows/reusable-pio-release.yml@v1
    secrets:
      platformio-auth-token: ${{ secrets.PLATFORMIO_AUTH_TOKEN }}
